<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>综述生成 - AI文献辅助系统</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>
<body>
    <!-- 顶部导航栏 -->
    <header class="app-header">
        <div class="header-left">
            <h1 class="app-title">AI文献助手</h1>
        </div>
        <div class="header-right">
            <span id="user-name" class="user-name"></span>
        </div>
    </header>

    <!-- 主容器 -->
    <div class="app-container">
        <!-- 主内容区域 -->
        <div class="app-main">
            <!-- 侧边导航 -->
            <aside class="app-sidebar">
                <nav class="sidebar-nav">
                    <a href="index.html" class="nav-item">
                        <span class="nav-icon"></span>
                        <span class="nav-text">首页</span>
                    </a>
                    <a href="retrieve.html" class="nav-item">
                        <span class="nav-icon"></span>
                        <span class="nav-text">论文检索</span>
                    </a>
                    <a href="summary.html" class="nav-item">
                        <span class="nav-icon"></span>
                        <span class="nav-text">论文总结</span>
                    </a>
                    <a href="translate.html" class="nav-item">
                        <span class="nav-icon"></span>
                        <span class="nav-text">论文翻译</span>
                    </a>
                    <a href="review.html" class="nav-item active">
                        <span class="nav-icon"></span>
                        <span class="nav-text">综述生成</span>
                    </a>
                </nav>
                
                <div class="sidebar-divider"></div>
                
                <nav class="sidebar-nav">
                    <a href="profile.html" class="nav-item">
                        <span class="nav-icon"></span>
                        <span class="nav-text">个人主页</span>
                    </a>
                </nav>
            </aside>

            <!-- 主内容区 -->
            <main class="app-content">
            <div class="page-header">
                <h2>综述生成</h2>
                <p class="page-subtitle">基于多篇论文自动生成学术综述，快速了解研究领域</p>
            </div>
            
            <div class="page-intro">
                <div class="intro-card">
                    <h3>功能介绍</h3>
                    <p>智能综述生成系统，能够分析多篇论文的研究内容，自动提取关键观点，生成结构化的学术综述文章。</p>
                </div>
                <div class="intro-card">
                    <h3>支持格式</h3>
                    <ul>
                        <li>PDF文件上传（支持多文件）</li>
                        <li>Markdown文件</li>
                        <li>Word文档</li>
                        <li>文本文件</li>
                        <li>直接粘贴论文内容</li>
                    </ul>
                </div>
            </div>
            
            <div class="tool-container">
                <div class="tool-config">
                    <div class="config-item full-width">
                        <label>研究主题</label>
                        <input type="text" id="review-topic" placeholder="请输入研究主题，例如：深度学习在自然语言处理中的应用">
                        <small class="config-tip">明确的研究主题有助于生成更准确的综述</small>
                    </div>
                </div>
                
                <div class="upload-area" id="upload-area">
                    <div class="upload-content" id="upload-prompt">
                        <div class="upload-icon">📄</div>
                        <h3>拖拽文件到此处</h3>
                        <p>支持多文件上传，或点击下方按钮选择文件</p>
                        <input type="file" id="review-file-input" accept=".pdf,.md,.txt,.docx" multiple style="display: none;">
                        <button onclick="document.getElementById('review-file-input').click()" class="tool-btn secondary">
                            选择文件
                        </button>
                    </div>
                    <div class="files-list" id="files-list" style="display: none;">
                        <h4>已上传文件</h4>
                        <div id="files-container"></div>
                        <button onclick="removeAllFiles()" class="tool-btn secondary" style="margin-top: 10px;">清空所有文件</button>
                    </div>
                    <div class="upload-progress" id="upload-progress" style="display: none;">
                        <div class="loading">正在处理文件...</div>
                    </div>
                </div>
                
                <div class="tool-input">
                    <label class="input-label">或粘贴论文内容</label>
                    <textarea id="review-papers" placeholder="请粘贴多篇论文的摘要或内容，用空行分隔不同论文..."></textarea>
                    <small class="config-tip">建议提供3-10篇论文的内容，每篇论文用空行分隔</small>
                    <div class="input-actions">
                        <button onclick="generateReview()" class="tool-btn primary">生成综述</button>
                        <button onclick="clearInput()" class="tool-btn secondary">清空</button>
                    </div>
                </div>
                
                <div class="tool-output">
                    <div class="output-header">
                        <h3>综述结果</h3>
                        <button onclick="downloadReviewResult()" class="tool-btn secondary" id="download-review-btn" style="display: none;">下载结果</button>
                    </div>
                    <div id="review-results" class="output-box"></div>
                </div>
            </div>
        </main>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
        const REVIEW_API_URL = 'http://localhost:8002';
        let currentTaskId = null;
        let statusInterval = null;
        let uploadedFiles = [];
        let uploadedFilesText = [];
        let currentReviewResult = '';

        function checkLogin() {
            document.getElementById('user-name').textContent = '用户';
        }

        async function generateReview() {
            const topic = document.getElementById('review-topic').value;
            
            if (!topic) {
                document.getElementById('review-results').innerHTML = '<div class="error-message">请输入研究主题</div>';
                return;
            }
            
            if (uploadedFiles.length === 0 && !document.getElementById('review-papers').value) {
                document.getElementById('review-results').innerHTML = '<div class="error-message">请上传文件或输入论文内容</div>';
                return;
            }
            
            document.getElementById('review-results').innerHTML = '<div class="loading">正在启动综述生成任务...</div>';
            
            try {
                const response = await fetch(`${REVIEW_API_URL}/review`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        topic: topic
                    })
                });
                
                const data = await response.json();
                
                if (data.task_id) {
                    currentTaskId = data.task_id;
                    document.getElementById('review-results').innerHTML = `<div class="loading">${data.message}</div>`;
                    pollTaskStatus(data.task_id);
                } else {
                    document.getElementById('review-results').innerHTML = `<div class="error-message">${data.detail || '启动任务失败'}</div>`;
                }
            } catch (error) {
                console.error('综述错误:', error);
                document.getElementById('review-results').innerHTML = `<div class="error-message">连接失败: ${error.message}<br>请确保综述生成API服务正在运行 (端口8002)</div>`;
            }
        }

        async function pollTaskStatus(taskId) {
            if (statusInterval) {
                clearInterval(statusInterval);
            }
            
            statusInterval = setInterval(async function() {
                try {
                    const response = await fetch(`${REVIEW_API_URL}/review/${taskId}`);
                    const data = await response.json();
                    
                    if (data.status === 'completed') {
                        clearInterval(statusInterval);
                        if (data.result && data.result.review) {
                            displayReviewResults(data.result.review);
                            saveHistory(document.getElementById('review-topic').value, data.result.review);
                        } else {
                            document.getElementById('review-results').innerHTML = '<div class="error-message">综述生成失败，未返回结果</div>';
                        }
                    } else if (data.status === 'failed') {
                        clearInterval(statusInterval);
                        document.getElementById('review-results').innerHTML = `<div class="error-message">综述生成失败: ${data.error || '未知错误'}</div>`;
                    } else if (data.status === 'running') {
                        document.getElementById('review-results').innerHTML = `<div class="loading">${data.message || '正在生成综述...'}</div>`;
                    }
                } catch (error) {
                    console.error('轮询错误:', error);
                    clearInterval(statusInterval);
                    document.getElementById('review-results').innerHTML = `<div class="error-message">连接中断: ${error.message}</div>`;
                }
            }, 3000);
        }

        function displayReviewResults(review) {
            const resultsDiv = document.getElementById('review-results');
            resultsDiv.innerHTML = `<div class="review-content">${marked.parse(review)}</div>`;
            currentReviewResult = review;
            document.getElementById('download-review-btn').style.display = 'inline-block';
            
            if (window.MathJax) {
                MathJax.typesetPromise([resultsDiv]).catch(err => console.error('MathJax渲染错误:', err));
            }
        }

        function downloadReviewResult() {
            if (!currentReviewResult) return;
            
            const topic = document.getElementById('review-topic').value || 'review';
            const filename = `${topic.replace(/[\/:*?"<>|]/g, '_')}_${new Date().toISOString().slice(0, 10)}.md`;
            
            const blob = new Blob([currentReviewResult], { type: 'text/markdown;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = filename;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
        }

        function clearInput() {
            if (statusInterval) {
                clearInterval(statusInterval);
            }
            currentTaskId = null;
            document.getElementById('review-topic').value = '';
            document.getElementById('review-papers').value = '';
            document.getElementById('review-results').innerHTML = '';
            removeAllFiles();
        }

        function saveHistory(topic, review) {
            const currentUser = localStorage.getItem('currentUser');
            if (!currentUser) return;
            
            const user = JSON.parse(currentUser);
            const history = JSON.parse(localStorage.getItem(`history_${user.id}`) || '[]');
            
            history.unshift({
                type: 'review',
                query: topic,
                result: review.substring(0, 100) + '...',
                time: new Date().toISOString()
            });
            
            localStorage.setItem(`history_${user.id}`, JSON.stringify(history.slice(0, 50)));
        }

        async function handleFiles(files) {
            if (!files || files.length === 0) {
                return;
            }
            
            const validExtensions = ['.pdf', '.md', '.txt', '.docx'];
            
            document.getElementById('upload-prompt').style.display = 'none';
            document.getElementById('files-list').style.display = 'none';
            document.getElementById('upload-progress').style.display = 'block';
            
            for (let file of files) {
                const fileExt = file.name.substring(file.name.lastIndexOf('.')).toLowerCase();
                
                if (!validExtensions.includes(fileExt)) {
                    alert(`文件 ${file.name} 格式不支持，仅支持 PDF、Markdown、Word、TXT 文件`);
                    continue;
                }
                
                try {
                    let text = '';
                    
                    if (fileExt === '.pdf') {
                        text = await extractTextFromPdf(file);
                    } else {
                        text = await readFileAsText(file);
                    }
                    
                    uploadedFiles.push(file);
                    uploadedFilesText.push(text);
                    
                } catch (error) {
                    console.error(`文件 ${file.name} 处理错误:`, error);
                    alert(`文件 ${file.name} 处理失败: ${error.message}`);
                }
            }
            
            updateFilesList();
            
            document.getElementById('upload-progress').style.display = 'none';
            if (uploadedFiles.length > 0) {
                document.getElementById('files-list').style.display = 'block';
            } else {
                document.getElementById('upload-prompt').style.display = 'block';
            }
        }

        async function extractTextFromPdf(file) {
            const arrayBuffer = await file.arrayBuffer();
            const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
            
            let fullText = '';
            const maxPages = Math.min(pdf.numPages, 50);
            
            for (let i = 1; i <= maxPages; i++) {
                const page = await pdf.getPage(i);
                const textContent = await page.getTextContent();
                const pageText = textContent.items.map(item => item.str).join(' ');
                fullText += pageText + '\n';
            }
            
            return fullText.trim();
        }

        async function readFileAsText(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = function(e) {
                    resolve(e.target.result);
                };
                reader.onerror = function() {
                    reject(new Error('文件读取失败'));
                };
                reader.readAsText(file);
            });
        }

        function updateFilesList() {
            const container = document.getElementById('files-container');
            container.innerHTML = '';
            
            uploadedFiles.forEach((file, index) => {
                const fileItem = document.createElement('div');
                fileItem.className = 'file-item';
                fileItem.innerHTML = `
                    <div class="file-details">
                        <span class="file-icon">📄</span>
                        <span class="file-name">${file.name}</span>
                        <span class="file-size">${formatFileSize(file.size)}</span>
                    </div>
                    <button onclick="removeFile(${index})" class="remove-btn">×</button>
                `;
                container.appendChild(fileItem);
            });
        }

        function removeFile(index) {
            uploadedFiles.splice(index, 1);
            uploadedFilesText.splice(index, 1);
            
            if (uploadedFiles.length === 0) {
                document.getElementById('files-list').style.display = 'none';
                document.getElementById('upload-prompt').style.display = 'block';
            } else {
                updateFilesList();
            }
        }

        function removeAllFiles() {
            uploadedFiles = [];
            uploadedFilesText = [];
            document.getElementById('files-list').style.display = 'none';
            document.getElementById('upload-prompt').style.display = 'block';
            document.getElementById('review-file-input').value = '';
        }

        function formatFileSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
        }

        document.addEventListener('DOMContentLoaded', function() {
            checkLogin();
            
            pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
            
            const fileInput = document.getElementById('review-file-input');
            fileInput.addEventListener('change', function(e) {
                if (e.target.files.length > 0) {
                    handleFiles(e.target.files);
                }
            });
            
            const uploadArea = document.getElementById('upload-area');
            uploadArea.addEventListener('dragover', function(e) {
                e.preventDefault();
                uploadArea.classList.add('dragover');
            });
            
            uploadArea.addEventListener('dragleave', function(e) {
                e.preventDefault();
                uploadArea.classList.remove('dragover');
            });
            
            uploadArea.addEventListener('drop', function(e) {
                e.preventDefault();
                uploadArea.classList.remove('dragover');
                if (e.dataTransfer.files.length > 0) {
                    handleFiles(e.dataTransfer.files);
                }
            });
            
            fetch(`${REVIEW_API_URL}/`)
                .then(response => response.json())
                .then(data => {
                    console.log('综述生成服务状态:', data);
                })
                .catch(error => {
                    console.log('综述生成服务未运行');
                });
        });
    </script>
</body>
</html>
