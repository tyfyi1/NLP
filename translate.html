<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>论文翻译 - AI文献辅助系统</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>
<body>
    <!-- 顶部导航栏 -->
    <header class="app-header">
        <div class="header-left">
            <h1 class="app-title">AI文献助手</h1>
        </div>
        <div class="header-right">
            <span id="user-name" class="user-name"></span>
        </div>
    </header>

    <!-- 主容器 -->
    <div class="app-container">
        <!-- 主内容区域 -->
        <div class="app-main">
            <!-- 侧边导航 -->
            <aside class="app-sidebar">
                <nav class="sidebar-nav">
                    <a href="index.html" class="nav-item">
                        <span class="nav-icon"></span>
                        <span class="nav-text">首页</span>
                    </a>
                    <a href="retrieve.html" class="nav-item">
                        <span class="nav-icon"></span>
                        <span class="nav-text">论文检索</span>
                    </a>
                    <a href="summary.html" class="nav-item">
                        <span class="nav-icon"></span>
                        <span class="nav-text">论文总结</span>
                    </a>
                    <a href="translate.html" class="nav-item active">
                        <span class="nav-icon"></span>
                        <span class="nav-text">论文翻译</span>
                    </a>
                    <a href="review.html" class="nav-item">
                        <span class="nav-icon"></span>
                        <span class="nav-text">综述生成</span>
                    </a>
                </nav>
                
                <div class="sidebar-divider"></div>
                
                <nav class="sidebar-nav">
                    <a href="profile.html" class="nav-item">
                        <span class="nav-icon"></span>
                        <span class="nav-text">个人主页</span>
                    </a>
                </nav>
            </aside>

            <!-- 主内容区 -->
            <main class="app-content">
            <div class="page-header">
                <h2>论文翻译</h2>
                <p class="page-subtitle">智能翻译学术论文内容，支持多种语言互译</p>
            </div>
            
            <div class="page-intro">
                <div class="intro-card">
                    <h3>功能介绍</h3>
                    <p>专业的学术论文翻译系统，能够准确翻译学术术语和专业表达，保持原文的学术严谨性。</p>
                </div>
                <div class="intro-card">
                    <h3>支持格式</h3>
                    <ul>
                        <li>PDF文件上传（自动识别公式）</li>
                        <li>Markdown文件</li>
                        <li>Word文档</li>
                        <li>文本文件</li>
                        <li>直接粘贴文本内容</li>
                    </ul>
                </div>
            </div>
            
            <div class="tool-container">
                <div class="tool-config">
                    <div class="config-item">
                        <label>源语言</label>
                        <select id="translate-source">
                            <option value="auto">自动检测</option>
                            <option value="zh">中文</option>
                            <option value="en">英文</option>
                            <option value="ja">日文</option>
                            <option value="ko">韩文</option>
                            <option value="fr">法文</option>
                            <option value="de">德文</option>
                            <option value="es">西班牙文</option>
                            <option value="it">意大利文</option>
                            <option value="ru">俄文</option>
                            <option value="ar">阿拉伯文</option>
                            <option value="pt">葡萄牙文</option>
                        </select>
                    </div>
                    <div class="config-item">
                        <label>目标语言</label>
                        <select id="translate-target">
                            <option value="zh">中文</option>
                            <option value="en">英文</option>
                            <option value="ja">日文</option>
                            <option value="ko">韩文</option>
                            <option value="fr">法文</option>
                            <option value="de">德文</option>
                            <option value="es">西班牙文</option>
                            <option value="it">意大利文</option>
                            <option value="ru">俄文</option>
                            <option value="ar">阿拉伯文</option>
                            <option value="pt">葡萄牙文</option>
                        </select>
                    </div>
                </div>
                
                <div class="upload-area" id="upload-area">
                    <div class="upload-content" id="upload-prompt">
                        <div class="upload-icon">📄</div>
                        <h3>拖拽文件到此处</h3>
                        <p>或点击下方按钮选择文件</p>
                        <input type="file" id="translate-file-input" accept=".pdf,.md,.txt,.docx" style="display: none;">
                        <button onclick="document.getElementById('translate-file-input').click()" class="tool-btn secondary">
                            选择文件
                        </button>
                    </div>
                    <div class="file-info" id="file-info" style="display: none;">
                        <div class="file-details">
                            <span class="file-icon">📄</span>
                            <span class="file-name" id="file-name"></span>
                            <span class="file-size" id="file-size"></span>
                        </div>
                        <button onclick="removeFile()" class="remove-btn">×</button>
                    </div>
                    <div class="upload-progress" id="upload-progress" style="display: none;">
                        <div class="loading">正在处理文件...</div>
                    </div>
                </div>
                
                <div class="tool-input">
                    <label class="input-label">或粘贴翻译内容</label>
                    <textarea id="translate-text" placeholder="请粘贴需要翻译的论文内容..."></textarea>
                    <div class="input-actions">
                        <button onclick="translateText()" class="tool-btn primary">开始翻译</button>
                        <button onclick="clearInput()" class="tool-btn secondary">清空</button>
                    </div>
                </div>
                
                <div class="tool-output">
                    <div class="output-header">
                        <h3>翻译结果</h3>
                        <button onclick="downloadTranslateResult()" class="tool-btn secondary" id="download-translate-btn" style="display: none;">下载结果</button>
                    </div>
                    <div id="translate-results" class="output-box"></div>
                </div>
            </div>
        </main>
        </div>
    </div>

    <script>
        const TRANSLATE_API_URL = 'http://localhost:5003';
        let uploadedFileText = '';
        let currentTranslationResult = '';

        function checkLogin() {
            document.getElementById('user-name').textContent = '用户';
        }

        async function translateText() {
            let inputText = uploadedFileText || document.getElementById('translate-text').value;
            const source = document.getElementById('translate-source').value;
            const target = document.getElementById('translate-target').value;
            
            if (!inputText) {
                document.getElementById('translate-results').innerHTML = '<div class="error-message">请上传文件或输入翻译内容</div>';
                return;
            }
            
            document.getElementById('translate-results').innerHTML = '<div class="loading">正在翻译，请稍候...</div>';
            
            try {
                const response = await fetch(`${TRANSLATE_API_URL}/api/translate`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        text: inputText,
                        source_lang: source,
                        target_lang: target,
                        style: 'technical'
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    displayTranslateResults(data.translation);
                    saveHistory(inputText.substring(0, 100), data.translation);
                } else {
                    document.getElementById('translate-results').innerHTML = `<div class="error-message">${data.message || '翻译失败'}</div>`;
                }
            } catch (error) {
                console.error('翻译错误:', error);
                document.getElementById('translate-results').innerHTML = `<div class="error-message">翻译失败: ${error.message}<br>请确保翻译API服务正在运行 (端口5003)</div>`;
            }
        }

        function displayTranslateResults(translation) {
            const resultsDiv = document.getElementById('translate-results');
            resultsDiv.innerHTML = `<div class="translate-content">${marked.parse(translation)}</div>`;
            currentTranslationResult = translation;
            document.getElementById('download-translate-btn').style.display = 'inline-block';
            
            if (window.MathJax) {
                MathJax.typesetPromise([resultsDiv]).catch(err => console.error('MathJax渲染错误:', err));
            }
        }

        function downloadTranslateResult() {
            if (!currentTranslationResult) return;
            
            const blob = new Blob([currentTranslationResult], { type: 'text/markdown;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `translation_${new Date().toISOString().slice(0, 10)}.md`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
        }

        function clearInput() {
            document.getElementById('translate-text').value = '';
            document.getElementById('translate-results').innerHTML = '';
            removeFile();
        }

        function saveHistory(text, translation) {
            const currentUser = localStorage.getItem('currentUser');
            if (!currentUser) return;
            
            const user = JSON.parse(currentUser);
            const history = JSON.parse(localStorage.getItem(`history_${user.id}`) || '[]');
            
            history.unshift({
                type: 'translate',
                query: text.substring(0, 100),
                result: translation.substring(0, 100) + '...',
                time: new Date().toISOString()
            });
            
            localStorage.setItem(`history_${user.id}`, JSON.stringify(history.slice(0, 50)));
        }

        function removeFile() {
            uploadedFileText = '';
            document.getElementById('file-info').style.display = 'none';
            document.getElementById('upload-prompt').style.display = 'block';
            document.getElementById('translate-file-input').value = '';
        }

        async function handleFile(file) {
            if (!file) {
                alert('请选择文件');
                return;
            }
            
            const validExtensions = ['.pdf', '.md', '.txt', '.docx'];
            const fileExt = file.name.substring(file.name.lastIndexOf('.')).toLowerCase();
            
            if (!validExtensions.includes(fileExt)) {
                alert('仅支持 PDF、Markdown、Word、TXT 文件');
                return;
            }
            
            document.getElementById('upload-prompt').style.display = 'none';
            document.getElementById('file-info').style.display = 'none';
            document.getElementById('upload-progress').style.display = 'block';
            
            document.getElementById('file-name').textContent = file.name;
            document.getElementById('file-size').textContent = formatFileSize(file.size);
            
            try {
                let text = '';
                
                if (fileExt === '.pdf') {
                    text = await extractTextFromPdf(file);
                } else if (fileExt === '.docx') {
                    document.getElementById('upload-progress').innerHTML = '<div class="loading">正在上传并翻译Word文档...</div>';
                    const formData = new FormData();
                    formData.append('file', file);
                    formData.append('source_lang', document.getElementById('translate-source').value);
                    formData.append('target_lang', document.getElementById('translate-target').value);
                    formData.append('style', 'technical');
                    
                    const response = await fetch(`${TRANSLATE_API_URL}/api/translate-file`, {
                        method: 'POST',
                        body: formData
                    });
                    
                    const data = await response.json();
                    
                    if (data.success) {
                        uploadedFileText = data.translation;
                        document.getElementById('upload-progress').style.display = 'none';
                        document.getElementById('file-info').style.display = 'flex';
                        displayTranslateResults(data.translation);
                        saveHistory(file.name, data.translation);
                        return;
                    } else {
                        throw new Error(data.message || 'Word文档翻译失败');
                    }
                } else {
                    text = await readFileAsText(file);
                }
                
                uploadedFileText = text;
                
                document.getElementById('upload-progress').style.display = 'none';
                document.getElementById('file-info').style.display = 'flex';
                
                document.getElementById('translate-text').value = text.substring(0, 5000);
            } catch (error) {
                console.error('文件处理错误:', error);
                alert('文件处理失败: ' + error.message);
                document.getElementById('upload-progress').style.display = 'none';
                document.getElementById('upload-prompt').style.display = 'block';
            }
        }

        async function extractTextFromPdf(file) {
            const arrayBuffer = await file.arrayBuffer();
            const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
            
            let fullText = '';
            const maxPages = Math.min(pdf.numPages, 50);
            
            for (let i = 1; i <= maxPages; i++) {
                const page = await pdf.getPage(i);
                const textContent = await page.getTextContent();
                const pageText = textContent.items.map(item => item.str).join(' ');
                fullText += pageText + '\n';
            }
            
            return fullText.trim();
        }

        async function readFileAsText(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = function(e) {
                    resolve(e.target.result);
                };
                reader.onerror = function() {
                    reject(new Error('文件读取失败'));
                };
                reader.readAsText(file);
            });
        }

        function formatFileSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
        }

        document.addEventListener('DOMContentLoaded', function() {
            checkLogin();
            
            pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
            
            const fileInput = document.getElementById('translate-file-input');
            fileInput.addEventListener('change', function(e) {
                if (e.target.files.length > 0) {
                    handleFile(e.target.files[0]);
                }
            });
            
            const uploadArea = document.getElementById('upload-area');
            uploadArea.addEventListener('dragover', function(e) {
                e.preventDefault();
                uploadArea.classList.add('dragover');
            });
            
            uploadArea.addEventListener('dragleave', function(e) {
                e.preventDefault();
                uploadArea.classList.remove('dragover');
            });
            
            uploadArea.addEventListener('drop', function(e) {
                e.preventDefault();
                uploadArea.classList.remove('dragover');
                if (e.dataTransfer.files.length > 0) {
                    handleFile(e.dataTransfer.files[0]);
                } else {
                    alert('请拖拽文件');
                }
            });
        });
    </script>
</body>
</html>
