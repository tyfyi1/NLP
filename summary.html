<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>论文总结 - AI文献辅助系统</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>
<body>
    <!-- 顶部导航栏 -->
    <header class="app-header">
        <div class="header-left">
            <h1 class="app-title">AI文献助手</h1>
        </div>
        <div class="header-right">
            <span id="user-name" class="user-name"></span>
            <button onclick="logout()" class="logout-btn">退出</button>
        </div>
    </header>

    <!-- 主容器 -->
    <div class="app-container">
        <!-- 主内容区域 -->
        <div class="app-main">
            <!-- 侧边导航 -->
            <aside class="app-sidebar">
                <nav class="sidebar-nav">
                    <a href="index.html" class="nav-item">
                        <span class="nav-icon"></span>
                        <span class="nav-text">首页</span>
                    </a>
                    <a href="retrieve.html" class="nav-item">
                        <span class="nav-icon"></span>
                        <span class="nav-text">论文检索</span>
                    </a>
                    <a href="summary.html" class="nav-item active">
                        <span class="nav-icon"></span>
                        <span class="nav-text">论文总结</span>
                    </a>
                    <a href="translate.html" class="nav-item">
                        <span class="nav-icon"></span>
                        <span class="nav-text">论文翻译</span>
                    </a>
                    <a href="review.html" class="nav-item">
                        <span class="nav-icon"></span>
                        <span class="nav-text">综述生成</span>
                    </a>
                </nav>
                
                <div class="sidebar-divider"></div>
                
                <nav class="sidebar-nav">
                    <a href="profile.html" class="nav-item">
                        <span class="nav-icon"></span>
                        <span class="nav-text">个人主页</span>
                    </a>
                </nav>
            </aside>

            <!-- 主内容区 -->
            <main class="app-content">
            <div class="page-header">
                <h2>论文总结</h2>
                <p class="page-subtitle">上传PDF文件或粘贴论文内容，AI自动生成摘要和关键点</p>
            </div>
            
            <div class="page-intro">
                <div class="intro-card">
                    <h3>功能介绍</h3>
                    <p>智能论文总结系统，能够自动提取论文的核心观点、研究方法、实验结果和结论，生成结构化的摘要总结。</p>
                </div>
                <div class="intro-card">
                    <h3>支持格式</h3>
                    <ul>
                        <li>✅ PDF文件上传（支持拖拽上传）</li>
                        <li>✅ 直接粘贴论文文本</li>
                        <li>✅ 简单摘要和详细总结两种模式</li>
                    </ul>
                </div>
            </div>
            
            <div class="tool-container">
                <div class="tool-config">
                    <div class="config-item">
                        <label>总结类型</label>
                        <select id="summary-type">
                            <option value="simple">简单摘要</option>
                            <option value="detailed">详细总结</option>
                        </select>
                        <small class="config-tip">简单摘要适合快速了解，详细总结包含更多细节</small>
                    </div>
                    <div class="config-item">
                        <label>最大长度</label>
                        <input type="number" id="summary-tokens" value="500" min="100" max="2000">
                        <small class="config-tip">控制生成摘要的长度</small>
                    </div>
                </div>
                
                <div class="upload-area" id="upload-area">
                    <div class="upload-content" id="upload-prompt">
                        <div class="upload-icon">📄</div>
                        <h3>拖拽PDF文件到此处</h3>
                        <p>或点击下方按钮选择文件</p>
                        <input type="file" id="pdf-file-input" accept=".pdf" style="display: none;">
                        <button onclick="document.getElementById('pdf-file-input').click()" class="tool-btn secondary">
                            选择PDF文件
                        </button>
                    </div>
                    <div class="file-info" id="file-info" style="display: none;">
                        <div class="file-details">
                            <span class="file-icon">📄</span>
                            <span class="file-name" id="file-name"></span>
                            <span class="file-size" id="file-size"></span>
                        </div>
                        <button onclick="removeFile()" class="remove-btn">×</button>
                    </div>
                    <div class="upload-progress" id="upload-progress" style="display: none;">
                        <div class="loading">正在提取PDF内容...</div>
                    </div>
                </div>
                
                <div class="tool-input">
                    <label class="input-label">或粘贴论文内容</label>
                    <textarea id="summary-text" placeholder="请粘贴论文内容或摘要..." maxlength="20000"></textarea>
                    <div class="char-counter">
                        <span id="char-count">0</span> / 20000 字符
                    </div>
                    <div class="input-actions">
                        <button onclick="generateSummary()" class="tool-btn primary">生成总结</button>
                        <button onclick="clearInput()" class="tool-btn secondary">清空</button>
                    </div>
                </div>
                
                <div class="tool-output">
                    <h3>总结结果</h3>
                    <div id="summary-results" class="output-box"></div>
                </div>
            </div>
        </main>
        </div>
    </div>

    <script>
        const SUMMARY_API_URL = 'http://localhost:5001';
        let uploadedPdfText = '';

        function checkLogin() {
            document.getElementById('user-name').textContent = '用户';
        }

        async function generateSummary() {
            let inputText = uploadedPdfText || document.getElementById('summary-text').value;
            const type = document.getElementById('summary-type').value;
            const tokens = document.getElementById('summary-tokens').value;
            
            if (!inputText) {
                document.getElementById('summary-results').innerHTML = '<div class="error-message">请上传PDF文件或输入论文内容</div>';
                return;
            }
            
            document.getElementById('summary-results').innerHTML = '<div class="loading">正在生成总结，请稍候...</div>';
            
            try {
                const response = await fetch(`${SUMMARY_API_URL}/api/summary`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        text: inputText,
                        type: type,
                        max_tokens: parseInt(tokens)
                    })
                });
                
                const data = await response.json();
                console.log('总结API返回:', data);
                
                if (data.success) {
                    displaySummaryResults(data.summary);
                    saveHistory(inputText.substring(0, 100), data.summary);
                } else {
                    document.getElementById('summary-results').innerHTML = `<div class="error-message">${data.message || '生成总结失败'}</div>`;
                }
            } catch (error) {
                console.error('总结错误:', error);
                document.getElementById('summary-results').innerHTML = `<div class="error-message">总结失败: ${error.message}<br>请确保总结API服务正在运行 (端口5001)</div>`;
            }
        }

        function displaySummaryResults(summary) {
            const resultsDiv = document.getElementById('summary-results');
            resultsDiv.innerHTML = `<div class="summary-content">${marked.parse(summary)}</div>`;
            
            if (window.MathJax) {
                MathJax.typesetPromise([resultsDiv]).catch(err => console.error('MathJax渲染错误:', err));
            }
        }

        function clearInput() {
            document.getElementById('summary-text').value = '';
            document.getElementById('summary-results').innerHTML = '';
            removeFile();
        }

        function saveHistory(text, summary) {
            const currentUser = localStorage.getItem('currentUser');
            if (!currentUser) return;
            
            const user = JSON.parse(currentUser);
            const history = JSON.parse(localStorage.getItem(`history_${user.id}`) || '[]');
            
            history.unshift({
                type: 'summary',
                query: text,
                result: summary.substring(0, 100) + '...',
                time: new Date().toISOString()
            });
            
            localStorage.setItem(`history_${user.id}`, JSON.stringify(history.slice(0, 50)));
        }

        function removeFile() {
            uploadedPdfText = '';
            document.getElementById('file-info').style.display = 'none';
            document.getElementById('upload-prompt').style.display = 'block';
            document.getElementById('pdf-file-input').value = '';
        }

        async function handlePdfFile(file) {
            if (!file || file.type !== 'application/pdf') {
                alert('请选择PDF文件');
                return;
            }
            
            document.getElementById('upload-prompt').style.display = 'none';
            document.getElementById('file-info').style.display = 'none';
            document.getElementById('upload-progress').style.display = 'block';
            
            document.getElementById('file-name').textContent = file.name;
            document.getElementById('file-size').textContent = formatFileSize(file.size);
            
            try {
                const text = await extractTextFromPdf(file);
                uploadedPdfText = text;
                
                document.getElementById('upload-progress').style.display = 'none';
                document.getElementById('file-info').style.display = 'flex';
                
                document.getElementById('summary-text').value = text.substring(0, 5000);
            } catch (error) {
                console.error('PDF提取错误:', error);
                alert('PDF内容提取失败，请尝试直接粘贴文本');
                document.getElementById('upload-progress').style.display = 'none';
                document.getElementById('upload-prompt').style.display = 'block';
            }
        }

        async function extractTextFromPdf(file) {
            const arrayBuffer = await file.arrayBuffer();
            const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
            
            let fullText = '';
            const maxPages = Math.min(pdf.numPages, 50);
            
            for (let i = 1; i <= maxPages; i++) {
                const page = await pdf.getPage(i);
                const textContent = await page.getTextContent();
                const pageText = textContent.items.map(item => item.str).join(' ');
                fullText += pageText + '\n';
            }
            
            return fullText.trim();
        }

        function formatFileSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
        }

        document.addEventListener('DOMContentLoaded', function() {
            checkLogin();
            
            pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
            
            const fileInput = document.getElementById('pdf-file-input');
            fileInput.addEventListener('change', function(e) {
                if (e.target.files.length > 0) {
                    handlePdfFile(e.target.files[0]);
                }
            });
            
            const uploadArea = document.getElementById('upload-area');
            uploadArea.addEventListener('dragover', function(e) {
                e.preventDefault();
                uploadArea.classList.add('dragover');
            });
            
            uploadArea.addEventListener('dragleave', function(e) {
                e.preventDefault();
                uploadArea.classList.remove('dragover');
            });
            
            uploadArea.addEventListener('drop', function(e) {
                e.preventDefault();
                uploadArea.classList.remove('dragover');
                if (e.dataTransfer.files.length > 0 && e.dataTransfer.files[0].type === 'application/pdf') {
                    handlePdfFile(e.dataTransfer.files[0]);
                } else {
                    alert('请拖拽PDF文件');
                }
            });
            
            const textarea = document.getElementById('summary-text');
            textarea.addEventListener('input', function() {
                document.getElementById('char-count').textContent = this.value.length;
            });
        });
    </script>
</body>
</html>
